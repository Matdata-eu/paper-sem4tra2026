name: Build PDF

on:
  push:
  pull_request:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build PDF in Docker
        shell: pwsh
        run: ./build-pdf.ps1

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdf
          path: output/paper.pdf

      - name: Prepare release asset
        if: github.event_name == 'release'
        run: cp output/paper.pdf output/Sem4tra2026-Norway.pdf

      - name: Upload PDF to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: output/Sem4tra2026-Norway.pdf
